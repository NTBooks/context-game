<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clawed's Revenge</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0014'/><rect x='3' y='6' width='8' height='20' rx='1' fill='%230055ff' opacity='.6'/><rect x='3' y='6' width='8' height='13' rx='1' fill='%2339ff14'/><line x1='3' y1='19' x2='11' y2='19' stroke='%23ffd700' stroke-width='1.5'/><rect x='14' y='13' width='15' height='6' rx='2' fill='%23334'/><rect x='14' y='13' width='10' height='6' rx='2' fill='%2300e5ff' opacity='.85'/><polygon points='29,16 24,13 24,19' fill='%2339ff14'/></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0014;
      display: grid;
      place-items: center;

      /* Mobile browsers: prefer "real" viewport heights to avoid bottom anchoring in portrait */
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;

      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);

      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      touch-action: none;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>

</html>
